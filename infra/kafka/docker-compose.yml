# Single-broker Kafka in KRaft mode (no Zookeeper needed) for local dev
# and testing of the agent message bus. Not for production use - see
# k8s/agent-service/README.md for a cluster-oriented deployment.
#
# Usage:
#   docker compose -f infra/kafka/docker-compose.yml up -d
#
# Kafka UI:
#   http://localhost:8080
#
# Go Aggregator API:
#   http://localhost:8081
#
# Prometheus Metrics:
#   http://localhost:2112/metrics
#
# pprof:
#   http://localhost:6060/debug/pprof/

services:
  kafka:
    image: apache/kafka:latest
    container_name: travelguru-kafka
    hostname: kafka

    ports:
      - "9092:9092"
      - "9094:9094"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092,PLAINTEXT_K8S://:9094

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092,PLAINTEXT_K8S://host.docker.internal:9094

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT_K8S:PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    volumes:
      - kafka-data:/tmp/kraft-combined-logs

    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: travelguru-kafka-ui

    depends_on:
      kafka:
        condition: service_healthy

    ports:
      - "8080:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: travelguru-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  go-aggregator:
    container_name: travelmaster-go-aggregator

    build:
      context: ../../apps/backend/go-kafka-consumer
      dockerfile: Dockerfile

    depends_on:
      kafka:
        condition: service_healthy

    restart: unless-stopped

    environment:
      KAFKA_BROKER: kafka:29092
      KAFKA_GROUP_ID: travelmaster-go-consumer

      FLIGHT_TOPIC: travelguru.agents.flights
      HOTEL_TOPIC: travelguru.agents.hotels
      PLACES_TOPIC: travelguru.agents.places
      WEATHER_TOPIC: travelguru.agents.weather

      HTTP_PORT: "8081"
      METRICS_PORT: "2112"
      PPROF_PORT: "6060"

    ports:
      - "8081:8081"
      - "2112:2112"
      - "6060:6060"

volumes:
  kafka-data: